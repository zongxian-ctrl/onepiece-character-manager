name: Deploy to GitHub Pages

# Builds the React frontend in static mode (VITE_STATIC=1 → localStorage store,
# no backend) and publishes client/dist to GitHub Pages on every push to main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build (static mode)
        working-directory: client
        run: npm run build
        env:
          VITE_STATIC: "1"
          # Pages serves from /<repo>/ — base_path has no trailing slash, Vite wants one.
          VITE_BASE: ${{ steps.pages.outputs.base_path }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
